<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 520" width="80" height="520">
  <!-- Mounting plate -->
  <rect x="28" y="0" width="24" height="8" rx="2" fill="#64748b"/>
  <circle cx="40" cy="8" r="3" fill="#475569"/>

  <!-- String -->
  <line x1="40" y1="11" x2="40" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="none"/>

  <!-- String texture marks -->
  <line x1="39" y1="80" x2="41" y2="82" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="39" y1="160" x2="41" y2="162" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="39" y1="240" x2="41" y2="242" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="39" y1="320" x2="41" y2="322" stroke="#cbd5e1" stroke-width="0.5"/>

  <!-- Plumb bob - classic tapered shape -->
  <path d="M40 420 L54 445 Q55 447 54 449 L42 490 Q40 496 38 490 L26 449 Q25 447 26 445 Z"
        fill="url(#bobGradient)" stroke="#334155" stroke-width="1"/>

  <!-- Plumb bob tip -->
  <path d="M38 490 Q40 502 42 490" fill="#1e293b"/>

  <!-- Plumb bob ring/collar -->
  <ellipse cx="40" cy="423" rx="10" ry="3" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Subtle center line on bob for dimension -->
  <line x1="40" y1="425" x2="40" y2="488" stroke="#475569" stroke-width="0.4" opacity="0.5"/>

  <!-- Gradient for the bob -->
  <defs>
    <linearGradient id="bobGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="40%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
</svg>
