<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 380" width="80" height="380">
  <!-- Mounting plate -->
  <rect x="28" y="0" width="24" height="8" rx="2" fill="#64748b"/>
  <circle cx="40" cy="8" r="3" fill="#475569"/>

  <!-- String -->
  <line x1="40" y1="11" x2="40" y2="290" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- String texture marks -->
  <line x1="39" y1="70" x2="41" y2="72" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="39" y1="140" x2="41" y2="142" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="39" y1="210" x2="41" y2="212" stroke="#cbd5e1" stroke-width="0.5"/>

  <!-- Plumb bob - classic tapered shape -->
  <path d="M40 290 L54 312 Q55 314 54 316 L42 352 Q40 358 38 352 L26 316 Q25 314 26 312 Z"
        fill="url(#bobGradient)" stroke="#334155" stroke-width="1"/>

  <!-- Plumb bob tip -->
  <path d="M38 352 Q40 363 42 352" fill="#1e293b"/>

  <!-- Plumb bob ring/collar -->
  <ellipse cx="40" cy="293" rx="10" ry="3" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Subtle center line on bob for dimension -->
  <line x1="40" y1="295" x2="40" y2="350" stroke="#475569" stroke-width="0.4" opacity="0.5"/>

  <!-- Gradient for the bob -->
  <defs>
    <linearGradient id="bobGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="40%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
</svg>
